kind = "web"
previewPath = "/"
title = "BetVoxa"
version = "1.0.0"
id = "artifacts/betvoxa-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21194

[services.development]
run = "pnpm --filter @workspace/betvoxa-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/betvoxa-clone", "run", "build" ]
publicDir = "artifacts/betvoxa-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21194"
BASE_PATH = "/"
